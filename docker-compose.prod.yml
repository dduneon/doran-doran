version: "3.9"

services:
  backend:
    image: ghcr.io/dduneon/dorandoran-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env.prod

  frontend:
    image: ghcr.io/dduneon/dorandoran-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
