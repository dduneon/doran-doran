version: "3.9"

services:
  backend:
    image: ghcr.io/dduneon/dorandoran-backend:latest
    restart: unless-stopped
    ports:
      - "4002:8000"
    env_file: .env.prod
    networks:
      - service-net
      - default

  frontend:
    image: ghcr.io/dduneon/dorandoran-frontend:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  service-net:
    external: true
